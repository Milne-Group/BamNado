name: Release Please

# Runs on every push to main.
# - Creates/updates a "Release vX.Y.Z" PR based on conventional commits.
# - When that PR is merged, pushes the git tag and triggers the Release workflow.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
